name: E2E Tests

on:
  # Run automatically after a successful deployment to main
  workflow_run:
    workflows: [Deploy]
    types: [completed]
    

  # Allow manual runs against any URL (defaults to production)
  workflow_dispatch:
    inputs:
      base_url:
        description: Base URL to test against
        required: false
        default: http://sqloptimiser.ddns.net

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    # For automatic triggers, only run when the deploy succeeded
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    defaults:
      run:
        working-directory: Frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npx playwright test --reporter=list,html
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: >-
            ${{
              github.event_name == 'workflow_dispatch' &&
              inputs.base_url != '' &&
              inputs.base_url ||
              'http://sqloptimiser.ddns.net'
            }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Frontend/playwright-report/
          retention-days: 14
