name: Deploy

on:

  push:
    branches: [main]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Host image
        uses: docker/build-push-action@v5
        with:
          context: Backend/aspnet-core
          file: Backend/aspnet-core/src/sql_optimizer.Web.Host/Dockerfile
          push: true
          tags: ghcr.io/teboho02/sql-optimizer-backend:latest

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: Frontend
          file: Frontend/Dockerfile
          push: true
          tags: ghcr.io/teboho02/sql-optimizer-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e

            # ── Docker ────────────────────────────────────────────────
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sudo sh
              sudo systemctl enable docker
              sudo systemctl start docker
            fi

            if ! groups $USER | grep -q docker; then
              sudo usermod -aG docker $USER
            fi

            # ── Deployment directory ──────────────────────────────────
            sudo mkdir -p /opt/team3 && sudo chown $USER:$USER /opt/team3

            # ── Write docker-compose ──────────────────────────────────
            cat > /opt/team3/docker-compose.yml <<'COMPOSEEOF'
            services:
              localdb:
                image: postgres:16-alpine
                env_file:
                  - .env
                environment:
                  POSTGRES_USER: ${LOCAL_POSTGRES_USER}
                  POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD}
                volumes:
                  - localdb_data:/var/lib/postgresql/data
                restart: always

              abp_host:
                image: ghcr.io/teboho02/sql-optimizer-backend:latest
                env_file:
                  - .env
                environment:
                  TZ: "America/Toronto"
                  Kestrel__Endpoints__Http__Url: "http://+:80"
                ports:
                  - "44312:80"
                volumes:
                  - "./Host-Logs:/app/App_Data/Logs"
                  - "./Host-Dumps:/app/App_Data/Dumps"
                depends_on:
                  - localdb
                restart: always

              frontend:
                image: ghcr.io/teboho02/sql-optimizer-frontend:latest
                ports:
                  - "3000:3000"
                restart: always

            volumes:
              localdb_data:
            COMPOSEEOF

            # ── Write env file ────────────────────────────────────────
            {
              printf 'ASPNETCORE_ENVIRONMENT=Production\n'
              printf 'ConnectionStrings__Default=Host=${{ secrets.DB_HOST }};Port=5432;Database=${{ secrets.DB_NAME }};Username=${{ secrets.DB_USER }};Password=${{ secrets.DB_PASSWORD }};SSL Mode=Require;\n'
              printf 'Authentication__JwtBearer__SecurityKey=%s\n' '${{ secrets.JWT_SECURITY_KEY }}'
              printf 'Authentication__JwtBearer__Issuer=Team3\n'
              printf 'Authentication__JwtBearer__Audience=Team3\n'
              printf 'OPENAI_KEY=%s\n' '${{ secrets.OPENAI_KEY }}'
              printf 'LOCAL_POSTGRES_USER=%s\n' '${{ secrets.LOCAL_POSTGRES_USER }}'
              printf 'LOCAL_POSTGRES_PASSWORD=%s\n' '${{ secrets.LOCAL_POSTGRES_PASSWORD }}'
              printf 'LOCAL_POSTGRES_HOST=localdb\n'
              printf 'LOCAL_POSTGRES_PORT=5432\n'
              printf 'App__ServerRootAddress=http://sqloptimiser.ddns.net/\n'
              printf 'App__ClientRootAddress=http://sqloptimiser.ddns.net/\n'
              printf 'App__CorsOrigins=http://sqloptimiser.ddns.net\n'
            } > /opt/team3/.env

            # ── Deploy ────────────────────────────────────────────────
            # Pull new images first, then recreate only the app containers.
            # localdb is intentionally excluded so its volume (and all
            # restored databases inside it) survives every redeploy.
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u teboho02 --password-stdin
            sudo docker compose -f /opt/team3/docker-compose.yml --project-directory /opt/team3 pull
            sudo docker compose -f /opt/team3/docker-compose.yml --project-directory /opt/team3 up -d --force-recreate --no-deps abp_host frontend
            # Ensure localdb is running in case this is a first-time deploy
            sudo docker compose -f /opt/team3/docker-compose.yml --project-directory /opt/team3 up -d --no-recreate localdb
            sudo docker image prune -f
