server {
    listen 80;
    server_name sqloptimiser.ddns.net;

    # ── Backend — API, Swagger, SignalR ───────────────────────────────────────

    location /api/ {
        proxy_pass         http://localhost:44312;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /swagger {
        proxy_pass         http://localhost:44312;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SignalR requires WebSocket upgrade support.
    location /signalr {
        proxy_pass         http://localhost:44312;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Frontend — Next.js ────────────────────────────────────────────────────
    # Uncomment these two blocks once the Next.js container is running on
    # port 3000. Until then, / returns a 503 to avoid a misleading 502.

    # location /_next/ {
    #     proxy_pass         http://localhost:3000;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Upgrade           $http_upgrade;
    #     proxy_set_header   Connection        "upgrade";
    #     proxy_set_header   Host              $host;
    #     proxy_set_header   X-Real-IP         $remote_addr;
    #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    # }

    # location / {
    #     proxy_pass         http://localhost:3000;
    #     proxy_http_version 1.1;
    #     proxy_set_header   Host              $host;
    #     proxy_set_header   X-Real-IP         $remote_addr;
    #     proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header   X-Forwarded-Proto $scheme;
    # }

    location / {
        return 503 "Frontend not yet deployed.";
        add_header Content-Type text/plain;
    }
}
